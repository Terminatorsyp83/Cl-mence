<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💌 Mes 100 Petits Trésors</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07020c;
      --surface:   #140720;
      --card-lock: #1c0d2a;
      --card-open: #2a0e1e;
      --gold:      #c9a055;
      --gold2:     #f0d080;
      --rose:      #d4617a;
      --rose2:     #f2a0b0;
      --cream:     #f5ede0;
      --text:      #f0e6d3;
      --muted:     #7a607a;
      --radius:    14px;
      --trans:     0.4s cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    /* ─── STARS BACKGROUND ─── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,200,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 35%, rgba(255,220,180,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 50%, rgba(255,200,220,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 25%, rgba(255,255,180,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 40%, rgba(255,220,200,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 75%, rgba(255,200,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 85%, rgba(255,255,200,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 60%, rgba(255,180,200,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 90%, rgba(200,220,255,0.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 5% 50%, rgba(255,255,220,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 80%, rgba(255,220,240,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 5%, rgba(255,240,200,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 30% 90%, rgba(255,255,255,0.2) 0%, transparent 100%);
      pointer-events: none;
    }

    /* ─── HEADER ─── */
    .header {
      position: relative; z-index: 1;
      text-align: center;
      padding: 3rem 1rem 1.5rem;
    }

    .header-hearts {
      font-size: 1.4rem;
      letter-spacing: 0.5rem;
      opacity: 0.7;
      animation: floatHearts 3s ease-in-out infinite;
    }
    @keyframes floatHearts {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 300;
      font-style: italic;
      color: var(--gold2);
      line-height: 1.1;
      margin: 0.4rem 0 0.6rem;
      text-shadow: 0 0 40px rgba(240,208,128,0.3);
    }

    .header-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--rose2);
      opacity: 0.85;
      letter-spacing: 0.04em;
    }

    /* ─── PROGRESS ─── */
    .progress-wrap {
      position: relative; z-index: 1;
      max-width: 500px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
    }

    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .progress-bar-bg {
      height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--rose), var(--gold));
      border-radius: 99px;
      transition: width 0.8s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 10px rgba(212,97,122,0.5);
    }

    /* ─── GRID ─── */
    .grid-wrap {
      position: relative; z-index: 1;
      max-width: 1100px;
      margin: 2rem auto 4rem;
      padding: 0 clamp(0.75rem, 3vw, 2rem);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(clamp(68px, 9vw, 96px), 1fr));
      gap: clamp(8px, 1.5vw, 14px);
    }

    /* ─── BOX ─── */
    .box {
      aspect-ratio: 1;
      border-radius: var(--radius);
      cursor: default;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      gap: 4px;
      transition: transform var(--trans), box-shadow var(--trans);
      user-select: none;
      overflow: hidden;
    }

    /* Number label */
    .box-num {
      font-size: clamp(0.55rem, 1.2vw, 0.75rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      opacity: 0.5;
    }

    .box-emoji {
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      line-height: 1;
    }

    /* ── LOCKED ── */
    .box.locked {
      background: var(--card-lock);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .box.locked .box-num { color: var(--muted); }
    .box.locked .box-emoji { opacity: 0.25; }

    /* ── AVAILABLE ── */
    .box.available {
      background: linear-gradient(135deg, #2a1040 0%, #1a0828 100%);
      border: 1px solid var(--gold);
      cursor: pointer;
      animation: pulse-glow 2s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(201,160,85,0.25), inset 0 0 20px rgba(201,160,85,0.05);
    }
    .box.available .box-num { color: var(--gold); }
    .box.available .box-emoji { opacity: 1; }
    .box.available:hover {
      transform: scale(1.08) translateY(-3px);
      box-shadow: 0 8px 30px rgba(201,160,85,0.4), inset 0 0 20px rgba(201,160,85,0.1);
    }
    .box.available:active { transform: scale(0.97); }

    @keyframes pulse-glow {
      0%,100% { box-shadow: 0 0 15px rgba(201,160,85,0.2), inset 0 0 15px rgba(201,160,85,0.04); }
      50%      { box-shadow: 0 0 28px rgba(201,160,85,0.4), inset 0 0 24px rgba(201,160,85,0.09); }
    }

    /* ── OPENED ── */
    .box.opened {
      background: linear-gradient(135deg, #2d0e1a 0%, #1e0a12 100%);
      border: 1px solid rgba(212,97,122,0.3);
      cursor: pointer;
    }
    .box.opened .box-num { color: var(--rose2); opacity: 0.6; }
    .box.opened .box-emoji { opacity: 0.7; }
    .box.opened:hover {
      transform: scale(1.04);
      box-shadow: 0 4px 20px rgba(212,97,122,0.2);
    }

    /* ── OPEN ANIMATION ── */
    @keyframes box-pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.18) rotate(3deg); }
      70%  { transform: scale(0.95) rotate(-1deg); }
      100% { transform: scale(1); }
    }
    .box.opening { animation: box-pop 0.5s cubic-bezier(.4,0,.2,1) forwards; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(7,2,12,0.88);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .modal-overlay.open {
      opacity: 1; pointer-events: all;
    }

    .modal {
      position: relative;
      background: linear-gradient(160deg, #200d30 0%, #150820 50%, #1e0a16 100%);
      border: 1px solid rgba(201,160,85,0.25);
      border-radius: 24px;
      padding: clamp(1.5rem, 4vw, 2.5rem);
      max-width: 520px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 60px rgba(201,160,85,0.07);
      transform: scale(0.9) translateY(20px);
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    }
    .modal-overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: rgba(255,255,255,0.07);
      border: none; border-radius: 50%;
      width: 36px; height: 36px;
      color: var(--muted);
      font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .modal-close:hover { background: rgba(212,97,122,0.2); color: var(--rose2); }

    .modal-badge {
      display: inline-block;
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(201,160,85,0.3);
      border-radius: 99px;
      padding: 3px 12px;
      margin-bottom: 1rem;
    }

    .modal-emoji {
      font-size: 3rem;
      display: block;
      text-align: center;
      margin-bottom: 0.5rem;
      animation: emoji-bounce 0.6s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes emoji-bounce {
      from { transform: scale(0) rotate(-20deg); }
      to   { transform: scale(1) rotate(0); }
    }

    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-style: italic;
      font-weight: 400;
      color: var(--gold2);
      text-align: center;
      margin-bottom: 1.2rem;
      line-height: 1.2;
    }

    /* Text content */
    .modal-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.05rem, 2.5vw, 1.25rem);
      font-style: italic;
      color: var(--cream);
      line-height: 1.8;
      text-align: center;
      opacity: 0.9;
    }

    /* Photo content */
    .modal-photo {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 1rem;
      aspect-ratio: 4/3;
      background: rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: center;
      border: 1px dashed rgba(201,160,85,0.2);
    }
    .modal-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 14px;
    }
    .modal-photo-placeholder {
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
      padding: 1rem;
    }

    /* Coupon content */
    .coupon {
      background: rgba(255,255,255,0.03);
      border: 2px dashed rgba(201,160,85,0.35);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      position: relative;
    }
    .coupon::before, .coupon::after {
      content: '✦';
      color: var(--gold);
      opacity: 0.4;
      font-size: 0.7rem;
      position: absolute;
      top: 50%; transform: translateY(-50%);
    }
    .coupon::before { left: -1px; }
    .coupon::after  { right: -1px; }

    .coupon-label {
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 0.6rem;
    }
    .coupon-main {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-style: italic;
      color: var(--cream);
      line-height: 1.3;
    }
    .coupon-footer {
      margin-top: 0.6rem;
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* Caption under photo */
    .modal-caption {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--rose2);
      text-align: center;
      margin-top: 0.8rem;
      opacity: 0.85;
    }

    /* Divider */
    .modal-divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.2rem auto;
    }

    /* Nav buttons */
    .modal-nav {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      justify-content: center;
    }
    .btn {
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.55rem 1.4rem;
      border-radius: 99px;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:active { transform: scale(0.96); }

    .btn-close {
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .btn-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    .btn-next {
      background: linear-gradient(135deg, var(--rose) 0%, #b84060 100%);
      color: white;
      box-shadow: 0 4px 20px rgba(212,97,122,0.35);
    }
    .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,97,122,0.45); }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 8px; height: 8px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 200;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }

    /* Scrollbar */
    .modal::-webkit-scrollbar { width: 4px; }
    .modal::-webkit-scrollbar-track { background: transparent; }
    .modal::-webkit-scrollbar-thumb { background: rgba(201,160,85,0.2); border-radius: 2px; }

    /* ─── FOOTER ─── */
    .footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 2rem 1rem 3rem;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .footer span { color: var(--rose); }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-hearts">♡ ♡ ♡</div>
    <h1>Mes 100 Petits Trésors</h1>
    <p class="header-sub">Ouvre-les dans l'ordre, un à un, comme autant de petits moments qui t'appartiennent.</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progression</span>
      <span id="prog-text">0 / 100</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close-btn" title="Fermer">✕</button>
      <div class="modal-badge" id="modal-badge">Trésor n°1</div>
      <span class="modal-emoji" id="modal-emoji">💌</span>
      <h2 class="modal-title" id="modal-title">Titre</h2>
      <div class="modal-divider"></div>
      <div id="modal-content"></div>
      <div class="modal-nav">
        <button class="btn btn-close" id="btn-close">Fermer</button>
        <button class="btn btn-next" id="btn-next" style="display:none">Suivant →</button>
      </div>
    </div>
  </div>

  <div class="footer">Créé avec <span>♥</span> rien que pour toi</div>

<script>
/* ═══════════════════════════════════════════════════════

/* ════════════════════════════════════════
   LOGIQUE DE L'APPLICATION
════════════════════════════════════════ */
const STORAGE_KEY = 'tresor-opened';

// Charge l'état depuis localStorage
function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { return []; }
}

function saveState(opened) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(opened));
}

let opened = loadState(); // tableau d'indices ouverts
let currentBoxIndex = null;

// ── Construire la grille ──
const grid = document.getElementById('grid');

function buildGrid() {
  grid.innerHTML = '';
  BOXES.forEach((box, i) => {
    const num = i + 1;
    const isOpened   = opened.includes(i);
    const isAvailable = !isOpened && (i === 0 || opened.includes(i - 1));

    const el = document.createElement('div');
    el.className = 'box ' + (isOpened ? 'opened' : isAvailable ? 'available' : 'locked');
    el.dataset.index = i;
    el.innerHTML = `
      <span class="box-num">${num < 10 ? '0'+num : num}</span>
      <span class="box-emoji">${isOpened ? '✓' : isAvailable ? box.emoji : '🔒'}</span>
    `;
    if (isOpened || isAvailable) {
      el.addEventListener('click', () => openModal(i));
    }
    grid.appendChild(el);
  });
  updateProgress();
}

// ── Barre de progression ──
function updateProgress() {
  const n = opened.length;
  document.getElementById('prog-text').textContent = `${n} / 100`;
  document.getElementById('prog-fill').style.width = `${n}%`;
}

// ── Modal ──
const overlay  = document.getElementById('modal-overlay');
const modal    = document.getElementById('modal');
const badge    = document.getElementById('modal-badge');
const emojiEl  = document.getElementById('modal-emoji');
const titleEl  = document.getElementById('modal-title');
const contentEl= document.getElementById('modal-content');
const btnClose = document.getElementById('btn-close');
const btnNext  = document.getElementById('btn-next');
const closeBtn = document.getElementById('modal-close-btn');

function openModal(index) {
  currentBoxIndex = index;
  const box = BOXES[index];
  const num = index + 1;
  const wasOpened = opened.includes(index);

  badge.textContent = `Trésor n°${num < 10 ? '0'+num : num}`;
  emojiEl.textContent = box.emoji;
  // re-trigger animation
  emojiEl.style.animation = 'none';
  void emojiEl.offsetHeight;
  emojiEl.style.animation = '';

  titleEl.textContent = box.title;
  contentEl.innerHTML = renderContent(box);

  // Bouton "Suivant"
  const nextExists = index < 99;
  const nextAvailableAfterOpen = true; // will be after marking opened
  if (!wasOpened && nextExists) {
    btnNext.style.display = 'inline-flex';
    btnNext.textContent = 'Suivant →';
  } else if (wasOpened && nextExists) {
    const nextOpened = opened.includes(index + 1);
    const nextAvailable = index + 1 <= opened.length; // rough check
    btnNext.style.display = 'none';
  } else {
    btnNext.style.display = 'none';
  }

  // Marquer comme ouvert si pas encore fait
  if (!wasOpened) {
    opened.push(index);
    saveState(opened);
    // Confettis !
    spawnConfetti();
    // Animation sur la case
    const boxEl = grid.querySelector(`[data-index="${index}"]`);
    if (boxEl) {
      boxEl.classList.add('opening');
      setTimeout(() => {
        boxEl.classList.remove('opening');
        buildGrid(); // rafraîchit la grille
      }, 600);
    }
    updateProgress();
  }

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderContent(box) {
  if (box.type === 'text') {
    const lines = box.content.replace(/\n/g, '<br>');
    return `<p class="modal-text">${lines}</p>`;
  }
  if (box.type === 'coupon') {
    return `
      <div class="coupon">
        <div class="coupon-label">✦ Bon Cadeau ✦</div>
        <div class="coupon-main">${box.couponText}</div>
        <div class="coupon-footer">— à utiliser sans modération —</div>
      </div>`;
  }
  if (box.type === 'photo') {
    const caption = box.caption ? `<p class="modal-caption">"${box.caption}"</p>` : '';
    if (box.imageUrl) {
      return `
        <div class="modal-photo"><img src="${box.imageUrl}" alt="Photo" loading="lazy"></div>
        ${caption}`;
    } else {
      return `
        <div class="modal-photo">
          <div class="modal-photo-placeholder">📷<br><br>Ajoute ta photo ici<br><small style="opacity:.5">imageUrl: 'photos/xx.jpg'</small></div>
        </div>
        ${caption}`;
    }
  }
  return '';
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  currentBoxIndex = null;
}

btnClose.addEventListener('click', closeModal);
closeBtn.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

btnNext.addEventListener('click', () => {
  if (currentBoxIndex !== null && currentBoxIndex < 99) {
    closeModal();
    setTimeout(() => openModal(currentBoxIndex + 1), 200);
  }
});

// ── Confettis ──
function spawnConfetti() {
  const colors = ['#c9a055','#f0d080','#d4617a','#f2a0b0','#fff','#ffccdd'];
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.cssText = `
        left: ${Math.random() * 100}vw;
        top: -10px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        width: ${4 + Math.random() * 8}px;
        height: ${4 + Math.random() * 8}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration: ${1.5 + Math.random() * 2}s;
        animation-delay: ${Math.random() * 0.3}s;
      `;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }, i * 40);
  }
}

// ── Init ──
buildGrid();
</script>
